<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Music App{% endblock title %}</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 40px 0;
            font-family: "Times New Roman", serif;
            background: #f5f5f5;
        }

        .wrapper {
            width: 900px;
            margin: 0 auto;
            background: white;
            border: 2px solid #555;
            min-height: 700px;
            display: flex;
            flex-direction: column;
        }

        .top-menu {
            margin: 10px;
            border: 1px solid #777;
            background: #20b2aa;
        }

        .top-menu ul {
            margin: 0;
            padding: 0;
            list-style: none;
            display: flex;
        }

        .top-menu li {
            border-right: 1px solid rgba(255,255,255,0.4);
        }

        .top-menu a {
            display: block;
            padding: 8px 18px;
            color: white;
            text-decoration: none;
            font-size: 15px;
        }

        .top-menu a:hover {
            background: #16958e;
        }

        main {
            flex: 1;
            padding: 20px;
            border-top: 1px solid #777;
            border-bottom: 1px solid #777;
            margin: 0 10px;
        }

        h1 {
            margin-top: 0;
            font-size: 42px;
        }

        footer {
            margin: 0 10px 10px;
            padding: 8px 12px;
            border: 1px solid #777;
            font-size: 14px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 14px;
        }

        th, td {
            border: 1px solid #cfcfcf;
            padding: 10px;
            text-align: left;
            vertical-align: top;
        }

        th {
            background: #f2f2f2;
        }

        tr:nth-child(even) {
            background: #fafafa;
        }
    </style>
</head>
<body>
    <div class="menu">
        <a href="{% url 'index' %}">Главная</a>
        <a href="{% url 'genres' %}">Жанры музыки</a>
        <a href="{% url 'artists' %}">Исполнители</a>
        <a href="{% url 'tracks' %}">Треки</a>
    </div>
</body>
</html>
