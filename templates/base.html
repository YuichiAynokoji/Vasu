<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Music{% endblock %}</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 30px 0;
            background: #f3f3f3;
            font-family: "Times New Roman", serif;
        }

        .wrapper {
            width: 95%;
            max-width: 1200px;
            min-height: 700px;
            margin: 0 auto;
            border: 2px solid #444;
            background: #efefef;
            display: flex;
            flex-direction: column;
        }

        .menu {
            margin: 8px;
            background: #4ea58d;
            border: 1px solid #666;
            padding: 0;
        }

        .menu a {
            display: inline-block;
            color: white;
            text-decoration: none;
            padding: 10px 35px;
            font-size: 16px;
        }

        .menu a:hover {
            background: #418b77;
        }

        .content {
            flex: 1;
            margin: 0 8px;
            padding: 18px;
            border-top: 1px solid #777;
            border-bottom: 1px solid #777;
            background: #efefef;
        }

        footer {
            margin: 0 8px 8px 8px;
            padding: 12px 15px;
            border: 1px solid #777;
            background: #efefef;
            font-size: 15px;
        }

        h1 {
            margin-top: 0;
            font-size: 34px;
        }

        p, a, li {
            font-size: 18px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
        }

        th, td {
            border: 1px solid #d8d8d8;
            padding: 12px 10px;
            text-align: left;
            vertical-align: top;
            font-size: 18px;
        }

        th {
            background: #ececec;
            font-weight: bold;
        }

        tr:nth-child(even) {
            background: #fafafa;
        }

        .action-link {
            color: #2d3fb7;
            text-decoration: underline;
            margin-right: 10px;
        }

        .add-link {
            display: inline-block;
            margin-top: 20px;
            font-size: 20px;
            color: #2d3fb7;
        }

        form p {
            margin-bottom: 15px;
            font-size: 18px;
        }

        input, select, textarea {
            width: 100%;
            max-width: 500px;
            padding: 8px;
            font-size: 16px;
            border: 1px solid #888;
        }

        button {
            padding: 10px 18px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #666;
            background: #e6e6e6;
        }

        button:hover {
            background: #d9d9d9;
        }

        audio {
            width: 300px;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="menu">
            <a href="{% url 'index' %}">Главная</a>
            <a href="{% url 'genres' %}">Жанры</a>
            <a href="{% url 'tracks' %}">Треки</a>
            <a href="{% url 'artists' %}">Исполнители</a>
        </div>

        <div class="content">
            {% block content %}
            {% endblock %}
        </div>

        <footer>
            footer
        </footer>
    </div>
</body>
</html>
