{% extends "base.html" %}

{% block title %}Добавить исполнителя{% endblock %}

{% block content %}
    <h1>Добавить исполнителя</h1>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Сохранить</button>
    </form>

    <p>
        <a href="{% url 'artists' %}">Назад к исполнителям</a>
    </p>
{% endblock %}
